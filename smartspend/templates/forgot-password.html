<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartSpend | Forgot Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/forgot-password.css') }}">
</head>

<body>

<div class="blur circle1"></div>
<div class="blur circle2"></div>

<div class="container">

<div class="logo">

<div class="logo-icon">

<i class="fa-solid fa-wallet"></i>

</div>

<h2>SmartSpend</h2>

</div>

<h1>Forgot Password?</h1>

<p class="subtitle">

Don't worry! Enter your registered email address and we'll send you a password reset link.

</p>

<form action="#">

<div class="input-group">

<label>Email Address</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
name="email"
placeholder="Enter your email"
required>

</div>

</div>

<button type="submit" class="login-btn">

Send Reset Link

</button>

</form>

<div class="divider">

<span></span>

<p>Remember your password?</p>

<span></span>

</div>

<div class="back">

<a href="/login">

<i class="fa-solid fa-arrow-left"></i>

Back to Login

</a>

</div>

</div>

</body>

</html>
