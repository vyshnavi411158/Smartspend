{% extends "base.html" %}

{% block title %}
Edit Receipt | SmartSpend
{% endblock %}

{% block css %}

<link rel="stylesheet"
href="{{ url_for('static', filename='css/edit_receipt.css') }}">

{% endblock %}

{% block content %}

<header class="topbar">

    <div>

        <h1>Edit Receipt</h1>

        <p>Update your receipt information.</p>

    </div>

</header>

<section class="receipt-form">

<form method="POST"
      enctype="multipart/form-data">

<div class="form-grid">

<div class="input-group">

<label>Merchant</label>

<input
type="text"
name="merchant"
value="{{ receipt[1] }}"
required>

</div>

<div class="input-group">

<label>Amount</label>

<input
type="number"
step="0.01"
name="amount"
value="{{ receipt[2] }}"
required>

</div>

<div class="input-group">

<label>Date</label>

<input
type="date"
name="receipt_date"
value="{{ receipt[3].strftime('%Y-%m-%d') }}"
required>

</div>
<div class="input-group">

<label>Category</label>

<select name="category" required>

    {% for category in categories %}

    <option value="{{ category[0] }}"
    {% if category[0] == receipt[4] %}selected{% endif %}>

        {{ category[1] }}

    </option>

    {% endfor %}

</select>

</div>

<div class="input-group">

<label>Payment Method</label>

<select name="payment" required>

<option value="Cash"
{% if receipt[5]=="Cash" %}selected{% endif %}>Cash</option>

<option value="UPI"
{% if receipt[5]=="UPI" %}selected{% endif %}>UPI</option>

<option value="Credit Card"
{% if receipt[5]=="Credit Card" %}selected{% endif %}>Credit Card</option>

<option value="Debit Card"
{% if receipt[5]=="Debit Card" %}selected{% endif %}>Debit Card</option>

<option value="Net Banking"
{% if receipt[5]=="Net Banking" %}selected{% endif %}>Net Banking</option>

</select>

</div>

<div class="input-group full-width">

<label>Notes</label>

<textarea
name="notes"
rows="4">{{ receipt[6] }}</textarea>

</div>

<div class="input-group full-width">

<label>Replace Receipt Image</label>

<input
type="file"
name="receipt_image">

</div>

</div>

<div class="form-buttons">

<button
type="submit"
class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Update Receipt

</button>

<a
href="{{ url_for('receipts') }}"
class="cancel-btn">

Cancel

</a>

</div>

</form>

</section>

{% endblock %}
